 <head>

  <style>
* { -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; margin: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; }
.hide-scrollbar::-webkit-scrollbar { display: none; }
.hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
@keyframes slideIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
@keyframes bannerSlide { 0%,30% { opacity:1; } 33%,63% { opacity:0; } 66%,96% { opacity:0; } 100% { opacity:0; } }
.anim-in { animation: slideIn 0.5s ease both; }
.anim-d1 { animation-delay: 0.05s; }
.anim-d2 { animation-delay: 0.1s; }
.anim-d3 { animation-delay: 0.15s; }
.anim-d4 { animation-delay: 0.2s; }
.anim-d5 { animation-delay: 0.25s; }
.glass { background: rgba(255,255,255,0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.card-shadow { box-shadow: 0 2px 16px rgba(30,64,175,0.08); }
.banner-item { position: absolute; inset:0; transition: opacity 0.6s ease; }
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gray-50">
  <div id="app" class="w-full h-full flex flex-col max-w-[430px] mx-auto bg-white relative overflow-hidden"><!-- Scrollable Content -->
   <div class="flex-1 overflow-y-auto overflow-x-hidden pb-20" style="scroll-behavior:smooth;"><!-- Header -->
    <div class="relative" style="background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #0ea5e9 100%);">
     <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 20% 50%, white 1px, transparent 1px); background-size: 24px 24px;"></div>
     <div class="relative px-4 pt-3 pb-4"><!-- Top Row -->
      <div class="flex items-center justify-between mb-3 anim-in">
       <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-white/20 flex items-center justify-center">
         <svg width="18" height="18" viewbox="0 0 24 24" fill="none">
          <rect x="3" y="7" width="18" height="13" rx="3" stroke="white" stroke-width="2" /><path d="M8 7V5a4 4 0 018 0v2" stroke="white" stroke-width="2" stroke-linecap="round" /><circle cx="12" cy="14" r="2" fill="white" />
         </svg>
        </div><span id="el-title" class="text-white font-extrabold text-lg tracking-tight">Sewapoint</span>
       </div>
       <div class="flex items-center gap-1"><button class="w-9 h-9 rounded-xl glass flex items-center justify-center text-white hover:bg-white/25 transition"><i data-lucide="shopping-cart" style="width:18px;height:18px;"></i></button> <button class="w-9 h-9 rounded-xl glass flex items-center justify-center text-white hover:bg-white/25 transition relative"> <i data-lucide="message-circle" style="width:18px;height:18px;"></i> <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-red-500 rounded-full text-[9px] font-bold text-white flex items-center justify-center">3</span> </button>
       </div>
      </div><!-- Location -->
      <div class="flex items-center gap-1.5 anim-in anim-d1"><i data-lucide="map-pin" class="text-cyan-200" style="width:13px;height:13px;"></i> <span id="el-location" class="text-cyan-100 text-xs font-medium">Bandung</span> <i data-lucide="chevron-down" class="text-cyan-200" style="width:12px;height:12px;"></i>
      </div>
     </div><!-- Balance Card (overlapping) -->
     <div class="px-4 relative -mb-10 z-10 anim-in anim-d2">
      <div class="rounded-2xl p-3.5 flex items-center justify-between" style="background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(240,249,255,0.95)); backdrop-filter: blur(8px); box-shadow: 0 4px 24px rgba(30,64,175,0.12);">
       <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: linear-gradient(135deg, #1e40af, #3b82f6);"><i data-lucide="wallet" class="text-white" style="width:18px;height:18px;"></i>
        </div>
        <div>
         <p class="text-[11px] text-gray-400 font-medium">Saldo Anda</p>
         <p id="el-balance" class="text-lg font-extrabold text-gray-800 -mt-0.5">Rp 250.000</p>
        </div>
       </div><button class="px-4 py-2 rounded-xl text-xs font-bold text-white" style="background: linear-gradient(135deg, #1e40af, #3b82f6); box-shadow: 0 2px 8px rgba(59,130,246,0.4);">Top Up</button>
      </div>
     </div>
     <div class="h-10"></div>
    </div><!-- Search -->
    <div class="px-4 mt-6 anim-in anim-d3">
     <div class="relative"><i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300" style="width:18px;height:18px;"></i> <input id="el-search" type="text" placeholder="Cari barang sewa, toko, atau kategori…" class="w-full pl-11 pr-4 py-3 rounded-2xl bg-gray-50 border border-gray-100 text-sm text-gray-700 placeholder:text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-300 transition card-shadow">
     </div>
    </div><!-- Kategori -->
    <div class="mt-5 anim-in anim-d4">
     <div class="px-4 flex items-center justify-between mb-3">
      <h2 class="font-bold text-gray-800 text-sm">Kategori</h2><button class="text-xs text-blue-600 font-semibold">Lihat Semua</button>
     </div>
     <div class="px-4 flex gap-3 overflow-x-auto hide-scrollbar pb-1" id="cat-grid"><!-- Categories injected via JS -->
     </div>
    </div><!-- Banner Promo -->
    <div class="mt-5 px-4 anim-in anim-d5">
     <div class="relative rounded-2xl overflow-hidden" style="height: 150px;" id="banner-wrap"><!-- Banners injected via JS -->
     </div>
     <div class="flex justify-center gap-1.5 mt-2.5" id="banner-dots"></div>
    </div><!-- Toko Terdekat -->
    <div class="mt-5">
     <div class="px-4 flex items-center justify-between mb-3">
      <h2 class="font-bold text-gray-800 text-sm">Toko Terdekat</h2><button class="text-xs text-blue-600 font-semibold">Lihat Semua</button>
     </div>
     <div class="px-4 flex gap-3 overflow-x-auto hide-scrollbar pb-2" id="store-list"></div>
    </div><!-- Produk Populer -->
    <div class="mt-5 pb-4">
     <div class="px-4 flex items-center justify-between mb-3">
      <h2 class="font-bold text-gray-800 text-sm">Populer di Sekitarmu</h2><button class="text-xs text-blue-600 font-semibold">Lihat Semua</button>
     </div>
     <div class="px-4 grid grid-cols-2 gap-3" id="product-grid"></div>
    </div>
   </div><!-- Bottom Nav -->
   <div class="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-gray-100 z-20">
    <div class="flex items-center justify-around py-2" id="bottom-nav"></div>
   </div>

  <script>
const defaultConfig = {
  app_title: 'Sewapoint',
  user_location: 'Bandung',
  balance_amount: 'Rp 250.000',
  search_placeholder: 'Cari barang sewa, toko, atau kategori…',
  bg_color: '#1e40af',
  surface_color: '#ffffff',
  text_color: '#1f2937',
  primary_color: '#3b82f6',
  secondary_color: '#64748b',
  font_family: 'Plus Jakarta Sans',
  font_size: 14
};

// Categories
const categories = [
  { name:'Elektronik', emoji:'📱', color:'#eff6ff' },
  { name:'Kendaraan', emoji:'🚗', color:'#f0fdf4' },
  { name:'Properti', emoji:'🏠', color:'#fef3c7' },
  { name:'Acara', emoji:'🎤', color:'#fce7f3' },
  { name:'Lainnya', emoji:'📦', color:'#f1f5f9' }
];

// Banners
const banners = [
  { title:'Sewa PS5', sub:'Mulai Rp 50rb/hari', tag:'Promo', grad:'linear-gradient(135deg,#1e40af,#7c3aed)', emoji:'🎮' },
  { title:'Sewa Mobil', sub:'Diskon 20% minggu ini', tag:'Diskon', grad:'linear-gradient(135deg,#0d9488,#06b6d4)', emoji:'🚙' },
  { title:'Kamera DSLR', sub:'Best seller bulan ini', tag:'Best Seller', grad:'linear-gradient(135deg,#dc2626,#f97316)', emoji:'📷' }
];

// Stores
const stores = [
  { name:'TechRent Bdg', rating:'4.9', dist:'0.8 km', badge:'Official Store', items:'120+ barang', color:'#1e40af' },
  { name:'AutoSewa', rating:'4.8', dist:'1.2 km', badge:'Top Rated', items:'85+ barang', color:'#0d9488' },
  { name:'EventPro', rating:'4.7', dist:'2.1 km', badge:'Verified', items:'60+ barang', color:'#7c3aed' },
  { name:'GadgetGo', rating:'4.9', dist:'3.0 km', badge:'Official Store', items:'200+ barang', color:'#dc2626' }
];

// Products
const products = [
  { name:'Sony PS5 + 2 Stik', price:'Rp 75.000/hari', store:'TechRent Bdg', rating:'4.9', reviews:'128', emoji:'🎮', tag:'Best Seller' },
  { name:'Canon EOS R6', price:'Rp 150.000/hari', store:'GadgetGo', rating:'4.8', reviews:'89', emoji:'📷', tag:'Promo' },
  { name:'Toyota Avanza 2024', price:'Rp 350.000/hari', store:'AutoSewa', rating:'4.7', reviews:'256', emoji:'🚗', tag:'' },
  { name:'Sound System 2000W', price:'Rp 500.000/hari', store:'EventPro', rating:'4.8', reviews:'67', emoji:'🔊', tag:'Diskon' }
];

const navItems = [
  { icon:'home', label:'Beranda', active:true },
  { icon:'percent', label:'Promo', active:false },
  { icon:'bell', label:'Notifikasi', active:false },
  { icon:'user', label:'Akun', active:false }
];

// Render static parts
function renderCategories() {
  document.getElementById('cat-grid').innerHTML = categories.map(c =>
    `<button class="flex flex-col items-center gap-1.5 min-w-[64px]">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl transition hover:scale-105" style="background:${c.color};">${c.emoji}</div>
      <span class="text-[11px] font-semibold text-gray-600">${c.name}</span>
    </button>`
  ).join('');
}

let bannerIdx = 0;
function renderBanners() {
  const w = document.getElementById('banner-wrap');
  w.innerHTML = banners.map((b,i) =>
    `<div class="banner-item rounded-2xl p-5 flex flex-col justify-between" style="background:${b.grad}; opacity:${i===0?1:0};" data-bi="${i}">
      <div>
        <span class="inline-block px-2 py-0.5 rounded-full text-[10px] font-bold text-white bg-white/20 mb-2">${b.tag}</span>
        <p class="text-white font-extrabold text-xl">${b.title}</p>
        <p class="text-white/80 text-xs mt-0.5">${b.sub}</p>
      </div>
      <div class="absolute right-5 bottom-4 text-5xl opacity-30">${b.emoji}</div>
    </div>`
  ).join('');
  document.getElementById('banner-dots').innerHTML = banners.map((_,i) =>
    `<div class="w-2 h-2 rounded-full transition-all duration-300 ${i===0?'bg-blue-600 w-5':'bg-gray-300'}" data-dot="${i}"></div>`
  ).join('');
  setInterval(() => {
    bannerIdx = (bannerIdx+1)%banners.length;
    document.querySelectorAll('[data-bi]').forEach((el,i) => el.style.opacity = i===bannerIdx?1:0);
    document.querySelectorAll('[data-dot]').forEach((el,i) => {
      el.className = `h-2 rounded-full transition-all duration-300 ${i===bannerIdx?'bg-blue-600 w-5':'bg-gray-300 w-2'}`;
    });
  }, 3500);
}

function renderStores() {
  document.getElementById('store-list').innerHTML = stores.map(s => {
    const badgeColor = s.badge==='Official Store'?'bg-blue-50 text-blue-700': s.badge==='Top Rated'?'bg-amber-50 text-amber-700':'bg-green-50 text-green-700';
    return `<div class="min-w-[180px] rounded-2xl border border-gray-100 p-3 card-shadow bg-white hover:border-blue-200 transition cursor-pointer">
      <div class="w-full h-16 rounded-xl flex items-center justify-center mb-2.5" style="background: linear-gradient(135deg, ${s.color}15, ${s.color}25);">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold text-sm" style="background:${s.color};">${s.name[0]}</div>
      </div>
      <p class="font-bold text-gray-800 text-xs truncate">${s.name}</p>
      <div class="flex items-center gap-1 mt-0.5">
        <span class="text-amber-400 text-[10px]">★</span>
        <span class="text-[10px] font-semibold text-gray-600">${s.rating}</span>
        <span class="text-gray-300 text-[10px]">·</span>
        <span class="text-[10px] text-gray-400">${s.dist}</span>
      </div>
      <span class="inline-block mt-1.5 px-2 py-0.5 rounded-full text-[9px] font-bold ${badgeColor}">${s.badge}</span>
      <p class="text-[10px] text-gray-400 mt-1">${s.items}</p>
    </div>`;
  }).join('');
}

function renderProducts() {
  document.getElementById('product-grid').innerHTML = products.map(p =>
    `<div class="rounded-2xl border border-gray-100 bg-white card-shadow overflow-hidden hover:border-blue-200 transition cursor-pointer">
      <div class="h-28 flex items-center justify-center bg-gray-50 relative">
        <span class="text-5xl">${p.emoji}</span>
        ${p.tag?`<span class="absolute top-2 left-2 px-2 py-0.5 rounded-full text-[9px] font-bold text-white ${p.tag==='Best Seller'?'bg-amber-500':p.tag==='Promo'?'bg-blue-600':'bg-red-500'}">${p.tag}</span>`:''}
        <button class="absolute top-2 right-2 w-7 h-7 rounded-full bg-white/80 flex items-center justify-center"><i data-lucide="heart" class="text-gray-300" style="width:14px;height:14px;"></i></button>
      </div>
      <div class="p-3">
        <p class="font-bold text-gray-800 text-xs leading-tight line-clamp-2">${p.name}</p>
        <p class="text-blue-600 font-extrabold text-sm mt-1">${p.price}</p>
        <div class="flex items-center gap-1 mt-1.5">
          <span class="text-amber-400 text-[10px]">★</span>
          <span class="text-[10px] font-medium text-gray-500">${p.rating} (${p.reviews})</span>
        </div>
        <p class="text-[10px] text-gray-400 mt-0.5">${p.store}</p>
      </div>
    </div>`
  ).join('');
  lucide.createIcons();
}

function renderNav() {
  document.getElementById('bottom-nav').innerHTML = navItems.map(n =>
    `<button class="flex flex-col items-center gap-0.5 px-3 py-1 relative" onclick="switchNav(this)">
      ${n.active?'<div class="absolute -top-0 left-1/2 -translate-x-1/2 w-8 h-0.5 bg-blue-600 rounded-full"></div>':''}
      <i data-lucide="${n.icon}" style="width:20px;height:20px;" class="${n.active?'text-blue-600':'text-gray-400'}"></i>
      <span class="text-[10px] font-semibold ${n.active?'text-blue-600':'text-gray-400'}">${n.label}</span>
    </button>`
  ).join('');
  lucide.createIcons();
}

function switchNav(el) {
  const btns = el.parentElement.children;
  for(let b of btns) {
    b.innerHTML = b.innerHTML.replace(/<div class="absolute[^"]*"[^>]*><\/div>/,'');
    b.querySelector('i')?.classList.replace('text-blue-600','text-gray-400');
    b.querySelector('span')?.classList.replace('text-blue-600','text-gray-400');
  }
  el.querySelector('i')?.classList.replace('text-gray-400','text-blue-600');
  el.querySelector('span')?.classList.replace('text-gray-400','text-blue-600');
  el.insertAdjacentHTML('afterbegin','<div class="absolute -top-0 left-1/2 -translate-x-1/2 w-8 h-0.5 bg-blue-600 rounded-full"></div>');
}

// Init
renderCategories();
renderBanners();
renderStores();
renderProducts();
renderNav();

// Element SDK
function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  const font = c.font_family || defaultConfig.font_family;
  const base = c.font_size || defaultConfig.font_size;
  document.body.style.fontFamily = `${font}, sans-serif`;

  const el = (id) => document.getElementById(id);
  if(el('el-title')) el('el-title').textContent = c.app_title;
  if(el('el-location')) el('el-location').textContent = c.user_location;
  if(el('el-balance')) el('el-balance').textContent = c.balance_amount;
  if(el('el-search')) el('el-search').placeholder = c.search_placeholder;

  // font size scaling
  document.querySelectorAll('h2').forEach(h => h.style.fontSize = `${base}px`);
  document.querySelectorAll('p, span, button, input').forEach(e => {
    if(!e.closest('#bottom-nav')) e.style.fontFamily = `${font}, sans-serif`;
  });
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => applyConfig(config),
  mapToCapabilities: (config) => ({
    recolorables: [
      { get:()=>config.bg_color||defaultConfig.bg_color, set:(v)=>{config.bg_color=v; window.elementSdk.setConfig({bg_color:v});} },
      { get:()=>config.surface_color||defaultConfig.surface_color, set:(v)=>{config.surface_color=v; window.elementSdk.setConfig({surface_color:v});} },
      { get:()=>config.text_color||defaultConfig.text_color, set:(v)=>{config.text_color=v; window.elementSdk.setConfig({text_color:v});} },
      { get:()=>config.primary_color||defaultConfig.primary_color, set:(v)=>{config.primary_color=v; window.elementSdk.setConfig({primary_color:v});} },
      { get:()=>config.secondary_color||defaultConfig.secondary_color, set:(v)=>{config.secondary_color=v; window.elementSdk.setConfig({secondary_color:v});} }
    ],
    borderables: [],
    fontEditable: { get:()=>config.font_family||defaultConfig.font_family, set:(v)=>{config.font_family=v; window.elementSdk.setConfig({font_family:v});} },
    fontSizeable: { get:()=>config.font_size||defaultConfig.font_size, set:(v)=>{config.font_size=v; window.elementSdk.setConfig({font_size:v});} }
  }),
  mapToEditPanelValues: (config) => new Map([
    ['app_title', config.app_title || defaultConfig.app_title],
    ['user_location', config.user_location || defaultConfig.user_location],
    ['balance_amount', config.balance_amount || defaultConfig.balance_amount],
    ['search_placeholder', config.search_placeholder || defaultConfig.search_placeholder]
  ])
});

lucide.createIcons();
</script>
