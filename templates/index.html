<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sewapoint — Login</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { jakarta: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            sp: { blue: '#1677FF', teal: '#00C2A8', dark: '#0A1628', gray: '#F4F6F9' }
          }
        }
      }
    }
  </script>
  <style>
    html, body { height: 100%; margin: 0; }
    .hero-bg {
      background-image: url('https://i.imgur.com/vWnsNkI.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .anim-fade-up { animation: fadeUp 0.7s ease-out both; }
    .anim-fade-up-d1 { animation: fadeUp 0.7s 0.15s ease-out both; }
    .anim-fade-up-d2 { animation: fadeUp 0.7s 0.3s ease-out both; }
    .anim-fade-up-d3 { animation: fadeUp 0.7s 0.45s ease-out both; }
    .anim-slide-in { animation: slideIn 0.6s 0.2s ease-out both; }
    .input-field:focus-within { box-shadow: 0 0 0 3px rgba(22,119,255,0.15); border-color: #1677FF; }
    .input-field { transition: all 0.2s ease; }
    .btn-primary { transition: all 0.2s ease; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(22,119,255,0.35); }
    .btn-primary:active { transform: translateY(0); }
    .btn-social { transition: all 0.15s ease; }
    .btn-social:hover { border-color: #1677FF; background: #F8FAFF; }
    .glass-card { backdrop-filter: blur(12px); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); }
    .feature-pill { backdrop-filter: blur(8px); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); transition: all 0.2s ease; }
    .feature-pill:hover { background: rgba(255,255,255,0.18); transform: translateY(-2px); }
    .toast-msg {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600;
      z-index: 100; opacity: 0; transition: all 0.35s ease; pointer-events: none;
      background: #0A1628; color: white;
    }
    .toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full font-jakarta m-0 p-0" style="background-image: url('https://i.imgur.com/cMRfYsd.jpg'); background-size: contain; background-position: center; background-attachment: fixed; background-repeat: no-repeat; background-color: #0A1628;">
  <div id="app-wrapper" class="h-full w-full relative z-10 overflow-auto"><!-- Login Card - Center, Hidden by Default -->
   <div id="login-card-container" class="fixed top-1/2 left-1/2 w-[calc(100%-48px)] max-w-[420px] opacity-0 pointer-events-none transition-all duration-300" style="transform: translate(-50%, -50%) translateY(-20px);">
    <div class="anim-slide-in w-full relative"><!-- Card -->
     <div class="rounded-[20px] shadow-[0_4px_40px_rgba(10,22,40,0.06)] p-8 lg:p-10 bg-white"><!-- Logo -->
      <div class="flex justify-center mb-6"><img src="https://i.imgur.com/0x8ytOc.png" alt="Sewapoint Logo" class="h-16 object-contain" loading="lazy" onerror="console.error('Logo failed to load:', this.src); this.style.display='none';">
      </div><!-- Header -->
      <div class="mb-8">
       <h2 id="login-title" class="text-xl font-bold text-sp-dark mb-1.5">Masuk ke Akun</h2>
       <p class="text-sm text-gray-400">Selamat datang kembali di Sewapoint</p>
      </div><!-- Form -->
      <form id="login-form" onsubmit="return false;" class="space-y-4"><!-- Email -->
       <div><label for="email-input" class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Email / Username</label>
        <div class="input-field flex items-center gap-3 border border-gray-200 rounded-xl px-4 py-3 bg-sp-gray/50"><i data-lucide="mail" class="w-[18px] h-[18px] text-gray-400 shrink-0"></i> <input id="email-input" type="text" placeholder="nama@email.com" class="w-full bg-transparent outline-none text-sm text-sp-dark placeholder:text-gray-300 font-medium">
        </div>
       </div><!-- Password -->
       <div><label for="pw-input" class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Password</label>
        <div class="input-field flex items-center gap-3 border border-gray-200 rounded-xl px-4 py-3 bg-sp-gray/50"><i data-lucide="lock" class="w-[18px] h-[18px] text-gray-400 shrink-0"></i> <input id="pw-input" type="password" placeholder="••••••••" class="w-full bg-transparent outline-none text-sm text-sp-dark placeholder:text-gray-300 font-medium"> <button type="button" id="toggle-pw" class="shrink-0 text-gray-400 hover:text-sp-blue transition-colors" aria-label="Toggle password visibility"> <i data-lucide="eye" class="w-[18px] h-[18px]" id="eye-icon"></i> </button>
        </div>
       </div><!-- Forgot -->
       <div class="flex justify-end"><a href="#" onclick="event.preventDefault(); showToast('Link reset password telah dikirim!')" class="text-xs font-semibold text-sp-blue hover:text-sp-blue/80 transition-colors">Lupa Password?</a>
       </div><!-- Login Button --> <button type="submit" id="login-btn" class="btn-primary w-full py-3.5 rounded-xl bg-sp-blue text-white font-bold text-sm tracking-wide flex items-center justify-center gap-2"> <span id="login-btn-text">Masuk</span> <i data-lucide="arrow-right" class="w-4 h-4"></i> </button>
      </form><!-- Divider -->
      <div class="flex items-center gap-3 my-6">
       <div class="flex-1 h-px bg-gray-100"></div><span class="text-xs text-gray-300 font-medium">atau</span>
       <div class="flex-1 h-px bg-gray-100"></div>
      </div><!-- Social -->
      <div class="space-y-3"><button onclick="showToast('Google login — segera hadir!')" class="btn-social w-full py-3 rounded-xl border border-gray-200 flex items-center justify-center gap-3 text-sm font-semibold text-sp-dark bg-white">
        <svg width="18" height="18" viewbox="0 0 48 48">
         <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.9 33.4 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.2-2.7-.4-3.9z" /><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.3 15.7 18.8 13 24 13c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z" /><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.2 26.7 36 24 36c-5.3 0-9.8-3.6-11.3-8.5l-6.5 5C9.5 39.6 16.2 44 24 44z" /><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C36.9 39.2 44 34 44 24c0-1.3-.2-2.7-.4-3.9z" />
        </svg> Lanjutkan dengan Google </button> <button onclick="showToast('Facebook login — segera hadir!')" class="btn-social w-full py-3 rounded-xl border border-gray-200 flex items-center justify-center gap-3 text-sm font-semibold text-sp-dark bg-white">
        <svg width="18" height="18" viewbox="0 0 48 48">
         <path fill="#1877F2" d="M48 24a24 24 0 1 0-27.7 23.7V30.9h-6.1V24h6.1v-5.3c0-6 3.6-9.3 9.1-9.3 2.6 0 5.4.5 5.4.5v5.9h-3c-3 0-4 1.9-4 3.8V24h6.7l-1.1 6.9h-5.6v16.8A24 24 0 0 0 48 24z" /><path fill="#FFF" d="M33.3 30.9 34.4 24h-6.7v-4.4c0-1.9.9-3.8 4-3.8h3v-5.9s-2.8-.5-5.4-.5c-5.5 0-9.1 3.3-9.1 9.3V24h-6.1v6.9h6.1v16.8a24.3 24.3 0 0 0 7.4 0V30.9h5.6z" />
        </svg> Lanjutkan dengan Facebook </button>
      </div><!-- Register -->
      <p id="register-text" class="text-center text-sm text-gray-400 mt-7">Belum punya akun? <a href="#" onclick="event.preventDefault(); showToast('Halaman registrasi — segera hadir!')" class="text-sp-blue font-bold hover:underline">Daftar Sekarang</a></p>
     </div><!-- Footer -->
     <p class="text-center text-xs text-gray-300 mt-5">© 2026 Sewapoint. All rights reserved.</p><!-- Close Button (Top Right of Login Card) --> <button id="close-login-btn" onclick="toggleLoginCard()" class="absolute z-30 opacity-0 pointer-events-none transition-all duration-300 bg-white rounded-full p-2 hover:bg-gray-100" style="top: -12px; right: -12px; transform: scale(0.8);" aria-label="Close login card"> <i data-lucide="x" class="w-5 h-5 text-sp-dark"></i> </button>
    </div>
   </div><!-- Login/Register Button - Bottom Left -->
   <div class="fixed bottom-32 left-6 lg:bottom-40 lg:left-12 z-20"><button id="login-toggle-btn" onclick="toggleLoginCard()" class="btn-primary px-6 py-3.5 rounded-xl bg-sp-blue text-white font-bold text-sm tracking-wide flex items-center gap-2 shadow-lg hover:shadow-xl"> <i data-lucide="log-in" class="w-4 h-4"></i> <span>Login / Register</span> </button>
   </div><!-- Close Button (Top Right of Login Card) --> <button id="close-login-btn" onclick="toggleLoginCard()" class="absolute z-30 opacity-0 pointer-events-none transition-all duration-300 bg-white rounded-full p-2 hover:bg-gray-100" style="top: -12px; right: -12px; transform: scale(0.8);" aria-label="Close login card"> <i data-lucide="x" class="w-5 h-5 text-sp-dark"></i> </button><!-- Toast -->
   <div id="toast" class="toast-msg"></div>
   <script>
    // Toggle login card visibility
    function toggleLoginCard() {
      const container = document.getElementById('login-card-container');
      const closeBtn = document.getElementById('close-login-btn');
      const loginBtn = document.getElementById('login-toggle-btn');
      const isVisible = container.classList.contains('visible');
      
      if (isVisible) {
        // Hide
        container.classList.remove('visible');
        container.style.opacity = '0';
        container.style.pointerEvents = 'none';
        container.style.transform = 'translate(-50%, -50%) translateY(-20px)';
        closeBtn.style.opacity = '0';
        closeBtn.style.pointerEvents = 'none';
        loginBtn.style.display = 'flex';
      } else {
        // Show
        container.classList.add('visible');
        container.style.opacity = '1';
        container.style.pointerEvents = 'auto';
        container.style.transform = 'translate(-50%, -50%) translateY(0)';
        closeBtn.style.opacity = '1';
        closeBtn.style.pointerEvents = 'auto';
        loginBtn.style.display = 'none';
      }
    }

    // Toast
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // Password toggle
    let pwVisible = false;
    document.getElementById('toggle-pw').addEventListener('click', () => {
      pwVisible = !pwVisible;
      const inp = document.getElementById('pw-input');
      inp.type = pwVisible ? 'text' : 'password';
      const icon = document.getElementById('eye-icon');
      icon.setAttribute('data-lucide', pwVisible ? 'eye-off' : 'eye');
      lucide.createIcons();
    });

    // Login form
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email-input').value.trim();
      const pw = document.getElementById('pw-input').value.trim();
      if (!email || !pw) { showToast('Mohon isi semua field!'); return; }
      const btn = document.getElementById('login-btn');
      const btnText = document.getElementById('login-btn-text');
      btn.disabled = true; btn.style.opacity = '0.7';
      btnText.textContent = 'Memproses...';
      setTimeout(() => {
        btn.disabled = false; btn.style.opacity = '1';
        btnText.textContent = 'Masuk';
        showToast('Login berhasil! (Demo)');
      }, 1500);
    });

    // Element SDK
    const defaultConfig = {
      headline_text: 'Semua Bisa Disewa, Mudah di Sewapoint',
      subheadline_text: 'Platform marketplace untuk semua kebutuhan sewa',
      login_title: 'Masuk ke Akun',
      register_text: 'Belum punya akun?',
      background_color: '#F4F6F9',
      card_color: '#FFFFFF',
      text_color: '#0A1628',
      primary_color: '#1677FF',
      accent_color: '#00C2A8',
      font_family: 'Plus Jakarta Sans',
      font_size: 14
    };

    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };
      // Text
      const hl = document.getElementById('hero-headline');
      const parts = (c.headline_text || defaultConfig.headline_text).split(',');
      hl.innerHTML = parts.length > 1 ? parts[0] + ',<br>' + parts.slice(1).join(',') : c.headline_text;
      document.getElementById('hero-subheadline').textContent = c.subheadline_text || defaultConfig.subheadline_text;
      document.getElementById('login-title').textContent = c.login_title || defaultConfig.login_title;
      const regEl = document.getElementById('register-text');
      const regTxt = c.register_text || defaultConfig.register_text;
      regEl.innerHTML = regTxt + ' <a href="#" onclick="event.preventDefault(); showToast(\'Halaman registrasi — segera hadir!\')" class="font-bold hover:underline" style="color:' + c.primary_color + '">Daftar Sekarang</a>';

      // Colors
      document.body.style.backgroundColor = c.background_color;
      document.querySelector('.bg-white')?.style && (document.querySelector('#app-wrapper .bg-white').style.backgroundColor = c.card_color);
      document.getElementById('login-title').style.color = c.text_color;
      document.getElementById('login-btn').style.backgroundColor = c.primary_color;

      // Font
      const font = (c.font_family || defaultConfig.font_family) + ', sans-serif';
      document.body.style.fontFamily = font;
      const base = c.font_size || defaultConfig.font_size;
      document.body.style.fontSize = base + 'px';
      hl.style.fontSize = (base * 2.4) + 'px';
      document.getElementById('hero-subheadline').style.fontSize = (base * 1.15) + 'px';
      document.getElementById('login-title').style.fontSize = (base * 1.7) + 'px';
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.card_color || defaultConfig.card_color, set: (v) => { config.card_color = v; window.elementSdk.setConfig({ card_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
          { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['headline_text', config.headline_text || defaultConfig.headline_text],
        ['subheadline_text', config.subheadline_text || defaultConfig.subheadline_text],
        ['login_title', config.login_title || defaultConfig.login_title],
        ['register_text', config.register_text || defaultConfig.register_text]
      ])
    });

    lucide.createIcons();
  </script>
  </div>
